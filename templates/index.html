<!DOCTYPE html>
<html>
<head>
    <title>NexCart</title>

    <style>
        body { margin:0; font-family: Arial; background:#f1f3f6; }

        .header {
            background:#2874f0;
            color:white;
            padding:10px;
            display:flex;
            justify-content:space-between;
        }

        input { padding:8px; }

        .container {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap:15px;
            padding:20px;
        }

        .card {
            background:white;
            padding:15px;
            border-radius:8px;
        }

        img { width:100%; height:180px; object-fit:contain; }

        button {
            background:#fb641b;
            color:white;
            border:none;
            padding:8px;
            width:100%;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>🛒 NexCart</h2>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchProducts()">
</div>

<div style="padding:10px;">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <button onclick="viewCart()">View Cart</button>
    <button onclick="clearCart()">Clear Cart</button>
</div>

<div class="container" id="products"></div>

<script>
let allProducts = [];
let currentUser = null;

async function loadProducts() {
    let res = await fetch("/products");
    allProducts = await res.json();
    displayProducts(allProducts);
}

function displayProducts(products) {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>₹${p.price}</p>
                <button onclick="addToCart('${p.name}', ${p.price})">
                    Add to Cart
                </button>
            </div>
        `;
    });
}

function searchProducts(){
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = allProducts.filter(p => p.name.toLowerCase().includes(val));
    displayProducts(filtered);
}

async function register(){
    await fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });
    alert("Registered");
}

async function login(){
    let res = await fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });

    let data = await res.json();

    if(data.user_id){
        currentUser = data.user_id;
        alert("Login success");
    } else {
        alert("Login failed");
    }
}

async function addToCart(name, price){
    if(!currentUser){
        alert("Login first!");
        return;
    }

    await fetch("/add-to-cart", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name, price, user_id: currentUser
        })
    });

    alert("Added to cart");
}

async function viewCart(){
    let res = await fetch(`/cart/${currentUser}`);
    let data = await res.json();
    alert(JSON.stringify(data));
}

async function clearCart(){
    await fetch(`/clear-cart/${currentUser}`);
    alert("Cart cleared");
}

loadProducts();
</script>

</body>
</html>
