<!DOCTYPE html>
<html>
<head>
    <title>NexCart</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f3f6;
        }

        /* HEADER */
        .header {
            background: #2874f0;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        input {
            width: 50%;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        /* PRODUCT GRID */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        .name {
            font-size: 16px;
            font-weight: bold;
        }

        .price {
            color: green;
            font-size: 18px;
        }

        .old-price {
            text-decoration: line-through;
            color: gray;
            font-size: 14px;
        }

        .rating {
            background: green;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        button {
            background: #fb641b;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🛒 NexCart</div>
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="container" id="products"></div>

<script>
let allProducts = [];

async function loadProducts() {
    let res = await fetch("/products");
    allProducts = await res.json();
    displayProducts(allProducts);
}

function displayProducts(products) {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.img}">

            <div class="name">${p.name}</div>

            <div>
                <span class="price">₹${p.price}</span>
                <span class="old-price">₹${p.price + 50}</span>
            </div>

            <div class="rating">4.2 ★</div>

            <button onclick="buy('${p.name}')">Add to Cart</button>
        `;

        container.appendChild(div);
    });
}

function searchProducts() {
    let value = document.getElementById("search").value.toLowerCase();

    let filtered = allProducts.filter(p =>
        p.name.toLowerCase().includes(value)
    );

    displayProducts(filtered);
}

async function buy(name) {
    let res = await fetch(`/order/${name}`);
    let data = await res.json();
    alert(data.message);
}

loadProducts();
</script>

</body>
</html>
