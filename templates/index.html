<!DOCTYPE html>
<html>
<head>
    <title>NexCart</title> <!-- 🔴 CHANGE SHOP NAME HERE -->

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            color: #ff4d6d;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        img {
            width: 200px;
        }

        button {
            padding: 10px;
            background: #ff4d6d;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>
<body>

<h1>🛒 NexCart</h1> <!-- 🔴 CHANGE SHOP NAME -->

<div id="products"></div>

<script>
async function loadProducts() {

    let res = await fetch("/products");
    let data = await res.json();

    let container = document.getElementById("products");

    data.forEach(async (p) => {

        let aiRes = await fetch(`/ai-description/${p.name}`);
        let aiData = await aiRes.json();

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.img}"/>

            <h2>${p.name}</h2>

            <h3>₹${p.price}</h3>

            <p><b>Best for School, Office & Home</b></p>

            <p>${aiData.description}</p>

            <ul>
                ${p.features.map(f => `<li>${f}</li>`).join("")}
            </ul>

            <button onclick="buy('${p.name}')">Order Now</button>
        `;

        container.appendChild(div);
    });
}

async function buy(name) {
    let res = await fetch(`/order/${name}`);
    let data = await res.json();
    alert(data.message);
}

loadProducts();
</script>

</body>
</html>
